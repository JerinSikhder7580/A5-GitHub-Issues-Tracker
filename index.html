<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-base-200">

    <!-- login -->
    <div class="bg-base-100 h-screen w-screen flex items-center justify-center">



        <div class="w-[520px]  mx-auto p-8 shadow-lg rounded-md ">


            <div class="text-center">
                <img class="mx-auto mb-6" src="./assets/github-logo.png" alt="">
                <h1 class="font-semibold text-3xl">GitHub Issues Tracker</h1>
                <p class="text-gray-500 text-2xl mb-6">Sign in to manage your issues</p>
            </div>

            <div class="card bg-base-100 w-full shrink-0  mx-auto ">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-base text-black">Username</label>
                        <input id="username" type="email" class="input w-full" placeholder="Enter user name" />
                        <span class="text-[#4A00FF]">Default: admin</span>
                        <label class="label text-base text-black">Password</label>
                        <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                        <span class="text-[#4A00FF]">Default: admin123</span>
                        <button onclick="handleLogin()" class="btn btn-primary mt-4">Sign in</button>
                        <p id="error" class="text-red-500"></p>
                    </fieldset>
                </div>
            </div>
            <div class="divider mb-6">OR</div>
            <h6 class="text-[#64748B] text-center mb-2">Demo Credentials:</h6>
            <div class="p-6  bg-[#F8FAFC] flex justify-center">
                <div class="">
                    <h2><span class="font-semibold">Username:</span>admin</h2>
                    <h2><span class="font-semibold">Password:</span>admin123</h2>
                </div>

            </div>

        </div>
    </div>
























    <script src="./login.js"></script>
    <script src="./script.js"></script>
</body>

</html>
